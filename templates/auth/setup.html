{% extends "base_auth.html" %}

{% block title %}{{ app_title }} Setup{% endblock %}

{% block header %}
<h2><i class="bi bi-gear-fill"></i> {{ app_title }} Setup</h2>
<p><span class="badge-first-launch">First Launch</span></p>
<p class="mt-2">Create your admin account to get started</p>
{% endblock %}

{% block form %}
<form method="post" action="/setup">
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Choose a username">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required placeholder="At least 6 characters">
    </div>
    <div class="mb-4">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Re-enter password">
    </div>
    <button type="submit" class="btn btn-primary btn-auth w-100">Create Admin Account</button>
</form>
{% endblock %}
