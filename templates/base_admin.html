{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/admin.css">
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <span class="brand"><i class="bi bi-shield-lock"></i> Admin Panel</span>
            <a href="/" class="{% block nav_dashboard %}{% endblock %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/settings" class="{% block nav_settings %}{% endblock %}"><i class="bi bi-gear"></i> Settings</a>
            <a href="/logout" class="mt-4"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
        <div class="col-md-10 main-content">
            <nav class="navbar navbar-expand-lg mb-4 rounded">
                <div class="container-fluid">
                    <span class="navbar-text">
                        {% block navbar %}
                        Welcome, <strong>{{ username }}</strong>
                        {% endblock %}
                    </span>
                    <button class="dark-mode-toggle ms-auto" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill" id="dark-mode-icon"></i>
                    </button>
                </div>
            </nav>
            
            {% block page_content %}{% endblock %}
        </div>
    </div>
</div>

<script>
// Dark mode toggle functionality
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark);
    updateDarkModeIcon(isDark);
}

function updateDarkModeIcon(isDark) {
    const icon = document.getElementById('dark-mode-icon');
    if (icon) {
        icon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    }
}

// Apply saved dark mode preference on page load
document.addEventListener('DOMContentLoaded', function() {
    const savedDarkMode = localStorage.getItem('darkMode');
    if (savedDarkMode === 'true') {
        document.body.classList.add('dark-mode');
        updateDarkModeIcon(true);
    }
});
</script>
{% endblock %}
