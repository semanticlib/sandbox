{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css">
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        {% block header %}{% endblock %}
    </div>
    
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}
    
    {% block form %}{% endblock %}
</div>
{% endblock %}
